name: Veille RSS

# Le robot tourne tout seul, gratuitement, sans serveur à entretenir.
on:
  schedule:
    - cron: '0 */6 * * *'   # toutes les 6 heures (UTC)
  workflow_dispatch: {}      # bouton « Run workflow » pour lancer à la demande

permissions:
  contents: write            # autorise le commit de feed.json

jobs:
  veille:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Lancer la veille
        working-directory: scripts
        run: npm run veille

      - name: Publier les résultats
        run: |
          git config user.name "veille-bot"
          git config user.email "veille-bot@users.noreply.github.com"
          git add docs/data/feed.json
          if git diff --staged --quiet; then
            echo "Aucun changement"
          else
            git commit -m "Veille: mise à jour $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
