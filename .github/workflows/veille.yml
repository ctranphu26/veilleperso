name: Veille RSS
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  veille:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4
      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installer les dependances
        working-directory: scripts
        run: npm install --no-audit --no-fund
      - name: Lancer la veille
        working-directory: scripts
        run: npm run veille
      - name: Publier les resultats
        run: |
          git config user.name "veille-bot"
          git config user.email "veille-bot@users.noreply.github.com"
          git add docs/data/feed.json
          git commit -m "Veille: mise a jour" || echo "rien a committer"
          git push || echo "rien a pousser"
